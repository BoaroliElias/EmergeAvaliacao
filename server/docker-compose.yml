services:
  mongo:
    image: mongo:7
    container_name: projeto_avaliacao_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build: .
    container_name: projeto_avaliacao_server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/projeto_avaliacao
    depends_on:
      - mongo

volumes:
  mongo_data:
